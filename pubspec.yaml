name: flutter_todos
description: An example todos app that showcases bloc state management patterns.
version: 1.0.2+1
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  bloc: ^9.0.0
  cloud_firestore: ^5.6.6
  easy_localization: ^3.0.7+1
  equatable: ^2.0.0
  firebase_analytics: ^11.4.5
  firebase_auth: ^5.5.2
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.5
  firebase_remote_config: ^5.4.3
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  flutter_svg: ^2.0.17
  go_router: ^14.8.1
  intl: ^0.19.0
  kiwi: ^5.0.1
  nested: ^1.0.0

  package_info_plus: ^8.3.0
  reactive_forms: ^17.0.1
  rxdart: ^0.28.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.4
  mockingjay: ^0.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/app_icon/
    - assets/translations/
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon/launch_icon.png"
  min_sdk_android: 23 # android min sdk min:16, default 21
  remove_alpha_ios: true
